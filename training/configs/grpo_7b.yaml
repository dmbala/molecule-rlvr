# OpenRLHF GRPO config — 7B debug run (plan Execution step 10).
# Swap the model path to scale to 14B / 32B once this checkpoint clears the
# `sft-plus-rerank` baseline.

strategy: deepspeed_stage_2          # Zero-2 fits 7B on 4xH100 comfortably
pretrain: /models/Qwen3-8B           # after Stage 0 SFT; see training/configs/sft_*
reward_pretrain: null                # no learned reward model; using chemistry_verifier
save_path: /workspace/checkpoints/grpo_7b
ckpt_path: /workspace/checkpoints/grpo_7b

# --- GRPO specifics ---------------------------------------------------------
advantage_estimator: group_norm      # GRPO
n_samples_per_prompt: 8              # group size G
rollout_batch_size: 512
train_batch_size: 128
micro_train_batch_size: 2
micro_rollout_batch_size: 16
num_episodes: 500
max_epochs: 1
prompt_max_len: 2048
generate_max_len: 1024

# --- Learning ----------------------------------------------------------------
learning_rate: 5e-7                  # lower than the notes.md 1e-6 — GRPO on 7B is sensitive
kl_coef: 0.02                        # KL-to-reference; keep model close to SFT init
lambd: 1.0
gamma: 1.0
temperature: 0.9
top_p: 0.95

# --- Rollout (vLLM) ---------------------------------------------------------
vllm_num_engines: 2
vllm_tensor_parallel_size: 2
vllm_gpu_memory_utilization: 0.85

# --- Reward wiring ----------------------------------------------------------
# chemistry_verifier reads CHEM_VERIFIER_CONFIG env var; see verifier.yaml.
reward_functions:
  - chemistry_verifier

# --- Data -------------------------------------------------------------------
prompt_data: /workspace/data/prompts/mpro_prompts.jsonl
prompt_data_probs: "1.0"
input_key: instruction
label_key: null

# --- Logging ----------------------------------------------------------------
use_wandb: true
wandb_project: molecule-rlvr
wandb_run_name: grpo_7b_debug
logging_steps: 1
save_steps: 25
eval_steps: 25
