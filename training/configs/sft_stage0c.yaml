# SFT Stage 0c — small target-specific fine-tune on known Mpro inhibitors
# and analogs. Builds on the Stage 0b checkpoint.

strategy: deepspeed_stage_2
pretrain: /workspace/checkpoints/sft_stage0b
save_path: /workspace/checkpoints/sft_stage0c

dataset: /workspace/data/sft/stage0c/train.jsonl
input_key: text
max_len: 256               # short SMILES; no CoT at this stage

train_batch_size: 128
micro_train_batch_size: 16

learning_rate: 5e-6        # low — small corpus, don't erase Stage 0b behavior
max_epochs: 3
num_warmup_steps: 50
weight_decay: 0.01

tokenizer_extended: /workspace/checkpoints/sft_stage0b
resize_token_embeddings: false

use_wandb: true
wandb_project: molecule-rlvr
wandb_run_name: sft_stage0c
logging_steps: 5
save_steps: 200
